<!DOCTYPE html><html lang="uz"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ATU Books</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a1628;color:#fff;font-family:sans-serif}.nav{background:#0a1628;border-bottom:1px solid #c9a227;padding:12px 5%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}.nav-title{color:#c9a227;font-size:20px;font-weight:bold}.cart-btn{background:#c9a227;color:#0a1628;border:none;padding:8px 16px;border-radius:8px;font-weight:bold;cursor:pointer}.hero{text-align:center;padding:48px 5% 32px;background:linear-gradient(135deg,#0a1628,#0f2044)}.hero h1{font-size:2.5rem;margin-bottom:8px}.hero h1 span{color:#c9a227}.hero p{color:#9aa8c0;margin-bottom:24px}.tabs{display:flex;border-bottom:1px solid rgba(201,162,39,.2);padding:0 5%}.tab{background:none;border:none;color:#9aa8c0;padding:14px 20px;font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent}.tab.active{color:#c9a227;border-bottom-color:#c9a227}.section{padding:32px 5%}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}.card{background:#111e38;border:1px solid rgba(201,162,39,.2);border-radius:12px;overflow:hidden;transition:transform .2s}.card:hover{transform:translateY(-3px)}.card-img{width:100%;height:180px;object-fit:cover;background:#0d1f3c}.card-info{padding:10px}.card-cat{font-size:10px;color:#c9a227;text-transform:uppercase}.card-title{font-size:13px;font-weight:600;margin:3px 0}.card-author{font-size:11px;color:#9aa8c0;margin-bottom:8px}.card-footer{display:flex;justify-content:space-between;align-items:center}.card-price{color:#c9a227;font-weight:bold;font-size:13px}.add-btn{background:none;border:1px solid #c9a227;color:#c9a227;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer}.add-btn:hover{background:#c9a227;color:#0a1628}.gift-btn{width:100%;margin-top:8px;background:#c9a227;color:#0a1628;border:none;border-radius:8px;padding:7px;font-size:12px;font-weight:700;cursor:pointer}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#c9a227;color:#0a1628;padding:10px 20px;border-radius:10px;font-weight:600;font-size:13px;transition:transform .3s;z-index:300;pointer-events:none}.toast.show{transform:translateX(-50%) translateY(0)}footer{background:#0f2044;border-top:1px solid rgba(201,162,39,.2);padding:20px 5%;text-align:center;color:#9aa8c0;font-size:12px}footer a{color:#c9a227}</style></head><body>
<div class="nav"><span class="nav-title">ATU BOOKS</span><button class="cart-btn" onclick="openCart()">🛒 Savat <span id="cc">0</span></button></div>
<div class="hero"><h1>ATU <span>BOOKS</span></h1><p>Kitob • Bilim • Kelajak</p></div>
<div class="tabs"><button class="tab active" id="t1" onclick="showTab('kitoblar')">📚 Kitoblar</button><button class="tab" id="t2" onclick="showTab('sovgalar')">🎁 Sovg'alar</button></div>
<div id="s-kitoblar" class="section"><div class="grid" id="grid"></div></div>
<div id="s-sovgalar" class="section" style="display:none"><div class="grid" id="ggrid"></div></div>
<footer>📍 Uzgen | Instagram: <a href="https://instagram.com/atu.books.uzgen">@atu.books.uzgen</a></footer>
<div class="toast" id="toast"></div>
<script>
const B=[{id:1,t:"Mukoshafatul Qulub",a:"Abu Homid G'azzoliy",p:80000,c:"islomiy",img:"https://assets.asaxiy.uz/product/main_image/desktop/64a1234.jpg"},{id:2,t:"Er-xotinga nasihat",a:"Hassan Shamsiy Posho",p:120000,c:"oilaviy",img:"https://assets.asaxiy.uz/product/main_image/desktop/64b5678.jpg"},{id:3,t:"Bolakay, Ko'rsichqon...",a:"Charli Makkizi",p:50000,c:"roman",img:""},{id:4,t:"Qalbimdasan, Allohim",a:"Kadir Akel",p:60000,c:"islomiy",img:""},{id:5,t:"Qulog'im senda qizim",a:"Abdulloh Abdulmutiy",p:65000,c:"islomiy",img:""},{id:6,t:"Baxtiyor oila",a:"M.Sodiq M.Yusuf",p:75000,c:"oilaviy",img:""},{id:7,t:"Binafsha Shu'lasi I",a:"Usoma Muslim",p:60000,c:"roman",img:""},{id:8,t:"Binafsha Shu'lasi II",a:"Usoma Muslim",p:70000,c:"roman",img:""}];
const G=["Qizil Sumka Set","Oltin Quti Set","Kanselyariya To'plam","Ko'k Lenta To'plam","Premium Quti","Yashil Qadoqlash","Pushti Qadoqlash"];
let cart=[];
function fmt(p){return p.toLocaleString()+' so\'m';}
function render(){
document.getElementById('grid').innerHTML=B.map(b=>`<div class="card"><div class="card-img" style="background:#111e38;display:flex;align-items:center;justify-content:center;font-size:3rem">📚</div><div class="card-info"><div class="card-cat">${b.c}</div><div class="card-title">${b.t}</div><div class="card-author">${b.a}</div><div class="card-footer"><div class="card-price">${fmt(b.p)}</div><button class="add-btn" onclick="add(${b.id})">+</button></div></div></div>`).join('');
document.getElementById('ggrid').innerHTML=G.map((g,i)=>`<div class="card"><div class="card-img" style="background:#1a2f55;display:flex;align-items:center;justify-content:center;font-size:3rem">🎁</div><div class="card-info"><div class="card-title">${g}</div><div style="color:#c9a227;font-size:12px;margin-bottom:6px">📞 Narx so'rang</div><button class="gift-btn" onclick="toast('📞 @atu.books.uzgen ga yozing!')">Bog'lanish</button></div></div>`).join('');
}
function add(id){const b=B.find(x=>x.id===id);const e=cart.find(c=>c.id===id);if(e)e.q++;else cart.push({...b,q:1});document.getElementById('cc').textContent=cart.reduce((s,c)=>s+c.q,0);toast(`"${b.t}" savatga qo'shildi!`);}
function showTab(t){['kitoblar','sovgalar'].forEach(x=>{document.getElementById('s-'+x).style.display=x===t?'block':'none';document.getElementById(x==='kitoblar'?'t1':'t2').classList.toggle('active',x===t);});}
function openCart(){const t=cart.reduce((s,c)=>s+c.p*c.q,0);toast(cart.length?`Savat: ${cart.length} kitob | Jami: ${fmt(t)}`:'Savat bo\'sh');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
render();
</script></body></html>
